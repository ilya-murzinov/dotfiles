clear_all_shortcuts yes
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

font_family JetBrainsMono Nerd Font Mono
font_size 16.0
cursor_shape block
cursor_trail 1
cursor_trail_start_threshold 10
cursor_trail_decay 0.1 0.3 
enable_audio_bell no

map cmd+v paste_from_clipboard

# iTerm2-style tmux window switching (prefix C-s then [/])
map cmd+shift+] send_text all \x13]
map cmd+shift+[ send_text all \x13[
# Shift+Enter sends CSI 13;2u (distinct from regular Enter)
map shift+enter send_text all \x1b[13;2u
# Cmd+[/] sends C-o/C-i for vim jump back/forward
map cmd+[ send_text all \x0f
map cmd+] send_text all \x09

include catppuccin-mocha.conf
