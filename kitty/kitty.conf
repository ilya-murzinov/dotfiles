font_family JetBrainsMono Nerd Font Mono
font_size 16.0
cursor_shape block
enable_audio_bell no

# iTerm2-style tmux window switching (prefix C-s then [/])
map cmd+shift+] send_text all \x13]
map cmd+shift+[ send_text all \x13[
# Shift+Enter sends CSI 13;2u (distinct from regular Enter)
map shift+enter send_text all \x1b[13;2u

include catppuccin-mocha.conf
