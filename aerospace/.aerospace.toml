# Reference: https://github.com/i3/i3/blob/next/etc/config

config-version = 2

persistent-workspaces = ["0", "1", "2", "3", "4", "5"]

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[mode.main.binding]
    # See: https://nikitabobko.github.io/AeroSpace/goodies#open-a-new-window-with-applescript
    alt-enter = '''exec-and-forget osascript -e '
    tell application "Terminal"
        do script
        activate
    end tell'
    '''

    # i3 wraps focus by default
    alt-h =         'focus --boundaries-action wrap-around-the-workspace left'
    alt-j =         'focus --boundaries-action wrap-around-the-workspace down'
    alt-k =         'focus --boundaries-action wrap-around-the-workspace up'
    alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    ctrl-left = 'workspace prev'
    ctrl-right = 'workspace next'

    alt-ctrl-h = 'join-with left'
    alt-ctrl-j = 'join-with down'
    alt-ctrl-k = 'join-with up'
    alt-ctrl-l = 'join-with right'

    alt-e = 'fullscreen'

    alt-q = 'layout v_accordion' # 'layout stacking' in i3
    alt-w = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

    alt-shift-space = 'layout floating tiling' # 'floating toggle' in i3

    alt-a = 'workspace 1'
    alt-s = 'workspace 2'
    alt-d = 'workspace 3'
    alt-f = 'workspace 4'
    alt-g = 'workspace 5'

    alt-shift-a = 'move-node-to-workspace 1'
    alt-shift-s = 'move-node-to-workspace 2'
    alt-shift-d = 'move-node-to-workspace 3'
    alt-shift-f = 'move-node-to-workspace 4'
    alt-shift-g = 'move-node-to-workspace 5'

    alt-shift-c = 'reload-config'

    alt-ctrl-r = 'mode resize'

[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'
