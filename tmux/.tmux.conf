# Terminal colors (required for theme to show)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,alacritty:RGB,*-256color:RGB"

# Shift+Enter passthrough (CSI u) so apps (e.g. Claude Code) get \e[13;2u
bind-key -n S-Enter send-keys Escape "[13;2u"
set -s extended-keys on
set -as terminal-features 'tmux-256color:extkeys'

# Prefix: C-s
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# Vim-style pane navigation (matches nav layer hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy mode: prefix y (scrollback), then v = select, y = yank to clipboard (tmux-yank)
setw -g mode-keys vi
bind y copy-mode
bind -T copy-mode-vi v send -X begin-selection

# Splits (match Vim: s = horizontal/below, v = vertical/right)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %
unbind |
unbind -

# Resize with prefix + C-h/j/k/l (hold s + C-h etc.)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Window: c new, n/p next/prev, q kill window (with confirmation)
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind q confirm-before -p "Kill window #W? (y/n)" kill-window
unbind &

# Reload config (changed to prefix + C-r)
bind C-r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Rename window: prefix + r, then w
bind r switch-client -T rename_table
bind -T rename_table w command-prompt -I "#W" "rename-window '%%'"

# Sensible defaults
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g mouse on

# Toggle mouse: prefix + M (Shift+m), so prefix+m stays for your leader
bind M run-shell "tmux set -g mouse \$(tmux show -gv mouse | sed 's/^on$/off/;s/^off$/on/')" \; display "Mouse: #{?mouse,on,off}"

# Status (theme plugin overrides)
set -g status-position top

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_status_icon_enable 'no'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

run -b 'if [ -f ~/.tmux/plugins/tpm/tpm ]; then ~/.tmux/plugins/tpm/tpm; fi'