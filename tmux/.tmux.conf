# Terminal colors (required for theme to show)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,alacritty:RGB,*-256color:RGB"

# Prefix: C-t (hold s + t with HRM)
set -g prefix C-t
unbind C-b
bind C-t send-prefix

# Vim-style pane navigation (matches nav layer hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style copy mode (C-t y = enter copy mode, works with HRM/small layout)
# tmux-yank defaults to prefix+y for "copy line"; use prefix+L so our y stays copy-mode
set -g @yank_line L
setw -g mode-keys vi
bind y copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Splits (letters: v = vertical, b = horizontal bar)
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
unbind |
unbind -

# Resize with prefix + C-h/j/k/l (hold s + C-h etc.)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Window: c new, n/p next/prev, q kill window
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind q kill-window
unbind &

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Sensible defaults
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g mouse on

# Status (theme plugin overrides)
set -g status-position top

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_status_icon_enable 'no'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

run -b 'if [ -f ~/.tmux/plugins/tpm/tpm ]; then ~/.tmux/plugins/tpm/tpm; fi'