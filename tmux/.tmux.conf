# Terminal colors (required for theme to show)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,alacritty:RGB,*-256color:RGB"

# Shift+Enter passthrough (CSI u) so apps (e.g. Claude Code) get \e[13;2u
bind-key -n S-Enter send-keys Escape "[13;2u"
set -s extended-keys on
set -as terminal-features 'tmux-256color:extkeys'

# Prefix: C-s
set -g prefix C-s
bind C-s send-prefix

# Unbind everything
unbind C-b
unbind '"'
unbind %
unbind |
unbind -
unbind c
unbind &

# Copy mode: prefix y (scrollback), then v = select, y = yank to clipboard (tmux-yank)
setw -g mode-keys vi
bind c copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi Escape send-keys -X cancel

# Splits (match Vim: s = horizontal/below, v = vertical/right)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Resize with prefix + C-h/j/k/l (hold s + C-h etc.)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Window: n new, [/] prev/next, q kill window (with confirmation)
bind n new-window
bind ] next-window
bind [ previous-window
bind w choose-window

bind r switch-client -T r_table
bind -T r_table w command-prompt -I "#W" "rename-window '%%'"
bind -T r_table c source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Sensible defaults
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
set -g renumber-windows on
set -g escape-time 0
set -g set-clipboard on
set -g allow-passthrough on
set -g history-limit 50000
set -g mouse on

# Toggle mouse: prefix + M (Shift+m), so prefix+m stays for your leader
bind M run-shell "tmux set -g mouse \$(tmux show -gv mouse | sed 's/^on$/off/;s/^off$/on/')" \; display "Mouse: #{?mouse,on,off}"

# Status (theme plugin overrides)
set -g status-position top

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_status_icon_enable 'no'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

run -b 'if [ -f ~/.tmux/plugins/tpm/tpm ]; then ~/.tmux/plugins/tpm/tpm; fi'
