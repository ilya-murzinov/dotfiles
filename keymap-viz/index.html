<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Totem keymap</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; background: #1a1a1a; color: #e0e0e0; }
    h1 { font-size: 1.25rem; }
    .svg-wrap { background: #2a2a2a; border-radius: 8px; padding: 1rem; overflow: auto; margin-top: 0.5rem; }
    .svg-wrap img { max-width: 100%; height: auto; display: block; }
    .no-svg { color: #888; }
    a { color: #7eb8da; }
  </style>
</head>
<body>
  <h1>Totem keymap (ZMK)</h1>
  <p>Generated by <a href="https://github.com/caksoylar/keymap-drawer" target="_blank" rel="noopener">keymap-drawer</a>. Run <code>make keymap-viz</code> from the dotfiles repo to regenerate.</p>
  <div class="svg-wrap">
    <object data="totem.svg" type="image/svg+xml" style="max-width:100%; min-height:400px;">
      <p class="no-svg">No <code>totem.svg</code> yet. Run <code>make keymap-viz</code> from the dotfiles root.</p>
    </object>
  </div>
</body>
</html>
